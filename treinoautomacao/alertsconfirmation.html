    <ol>       
		<form id="form1" action="#">
			<input type="submit" id="alerta1" value="Exibir alerta!" onClick="exibir('alerta')">
			<input type="submit" id="confirmacao1" value="Exibir confirmação!" onClick="exibir('confirmacao')"><br>
		</form>
		
		<script type="text/javascript">
			function exibir(tipo) {
				if (tipo == "alerta") {
					alert('Olá!!! Eu sou um alerta!!!');
				}
				if (tipo == "confirmacao") {
					confirm('Olá!!! Eu sou a confirmação! Você vai fazer o que? (clicar em OK ou Cancelar?)');
				}
			}
		</script>		
		<br>
		<form>
			<input value="Exibir um alerta com delay!" onclick="setTimeout('alert(\'Olá!!! Eu sou um alerta com delay!!!\')',2000);" type="button">
			<input value="Exibir uma confirmação com delay!" onclick="setTimeout('confirm(\'Olá!!! Eu sou a confirmação com delay! Você vai fazer o que? Clicar em OK ou Cancelar?\')',2000);" type="button">
		</form>
