<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amtrindade - Treinamento em automacao de testes">
    <meta name="author" content="Antonio Trindade - http://about.me/amtrindade">

    <title>Gerador e Validador de CPF</title>

    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/justified-nav.css" rel="stylesheet">
    <link href="css/base.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <link href="css/components.css" rel="stylesheet">

    <style>
      .cpf-panel {
        max-width: 540px;
        margin: 40px auto 0;
        padding: 30px 25px;
        background-color: #f9f9f9;
        border: 1px solid #e5e5e5;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      }

      .cpf-actions {
        margin-top: 20px;
      }

      .cpf-status {
        min-height: 52px;
        margin-top: 20px;
      }

      .cpf-valido {
        border-color: #3c763d;
        box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.075), 0 0 8px rgba(60, 118, 61, 0.35);
      }

      .cpf-invalido {
        border-color: #a94442;
        box-shadow: inset 0 1px 1px rgba(0, 0, 0, 0.075), 0 0 8px rgba(169, 68, 66, 0.35);
      }

      @media (max-width: 767px) {
        .cpf-panel {
          margin-top: 25px;
          padding: 25px 18px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container" id="appContainer">
      <div class="masthead" id="pageHeader">
        <h3 class="text-muted" id="headerTitle">Treinamento em Automacao de Testes</h3>
        <ul class="nav nav-justified" id="mainNavigation">
          <li id="navItemHome"><a id="navHome" href="index.html">Home</a></li>
          <li id="navItemAlerts"><a id="navAlerts" href="alertsconfirmation.html">Alerts and Confirmations</a></li>
          <li id="navItemCalculadora"><a id="navCalculadora" href="desafiosoma.html">Calculadora</a></li>
          <li id="navItemTabela"><a id="navTabela" href="localizandovalorestable.html">Localizar Table</a></li>
          <li id="navItemXpath"><a id="navXpath" href="utilizandoxpath.html">Localizando por Xpath</a></li>
          <li id="navItemWebElementos"><a id="navWebElementos" href="elementsweb.html">Web Elementos</a></li>
          <li class="active" id="navItemGeradorCpf"><a id="navGeradorCpf" href="geradorcpf.html">Gerador CPF</a></li>
        </ul>
      </div>

      <div class="cpf-panel text-center" id="cpfPanel">
        <h1 id="pageTitle">Gerador e Validador de CPF</h1>
        <p class="lead" id="pageDescription">Gere um CPF válido, alterne a mascara e valide o valor digitado em tempo real.</p>

        <div class="form-group text-left" id="cpfFieldGroup">
          <label for="cpfInput" id="cpfInputLabel">CPF</label>
          <input type="text" class="form-control input-lg" id="cpfInput" placeholder="Digite um CPF ou gere um novo" autocomplete="off">
        </div>

        <div class="checkbox text-left" id="maskToggleGroup">
          <label id="maskToggleLabel">
            <input type="checkbox" id="maskToggle" checked>
            Exibir mascara
          </label>
        </div>

        <div class="cpf-actions" id="cpfActions">
          <button type="button" class="btn btn-primary btn-lg" id="generateButton">Gerar CPF</button>
        </div>

        <div class="cpf-status" id="statusContainer"></div>
      </div>

      <div class="footer" id="pageFooter"></div>
    </div>

    <script type="text/javascript">
      var cpfInput = document.getElementById("cpfInput");
      var maskToggle = document.getElementById("maskToggle");
      var generateButton = document.getElementById("generateButton");
      var statusContainer = document.getElementById("statusContainer");
      var pendingGenerationId = null;

      function somenteDigitos(cpf) {
        return (cpf || "").replace(/\D/g, "");
      }

      function todosDigitosIguais(cpf) {
        return /^(\d)\1{10}$/.test(cpf);
      }

      function calcularDigito(cpfBase, pesoInicial) {
        var soma = 0;
        var indice;

        for (indice = 0; indice < cpfBase.length; indice += 1) {
          soma += Number.parseInt(cpfBase.charAt(indice), 10) * (pesoInicial - indice);
        }

        soma = soma % 11;

        if (soma < 2) {
          return 0;
        }

        return 11 - soma;
      }

      function validarCpf(cpf) {
        var cpfLimpo = somenteDigitos(cpf);
        var cpfBase;
        var dv1;
        var dv2;

        if (cpfLimpo.length !== 11 || todosDigitosIguais(cpfLimpo)) {
          return false;
        }

        cpfBase = cpfLimpo.substring(0, 9);
        dv1 = calcularDigito(cpfBase, 10);
        dv2 = calcularDigito(cpfBase + dv1, 11);

        return cpfLimpo === cpfBase + String(dv1) + String(dv2);
      }

      function gerarCpfBase() {
        var cpfBase = "";
        var indice;

        for (indice = 0; indice < 9; indice += 1) {
          cpfBase += Math.floor(Math.random() * 10);
        }

        return cpfBase;
      }

      function gerarCpfValido() {
        var cpfBase = gerarCpfBase();
        var cpfCompleto = "";

        while (/^(\d)\1{8}$/.test(cpfBase)) {
          cpfBase = gerarCpfBase();
        }

        cpfCompleto = cpfBase + String(calcularDigito(cpfBase, 10));
        cpfCompleto += String(calcularDigito(cpfCompleto, 11));

        return cpfCompleto;
      }

      function aplicarMascaraCpf(cpf) {
        var cpfLimpo = somenteDigitos(cpf).substring(0, 11);

        if (cpfLimpo.length <= 3) {
          return cpfLimpo;
        }

        if (cpfLimpo.length <= 6) {
          return cpfLimpo.replace(/^(\d{3})(\d+)/, "$1.$2");
        }

        if (cpfLimpo.length <= 9) {
          return cpfLimpo.replace(/^(\d{3})(\d{3})(\d+)/, "$1.$2.$3");
        }

        return cpfLimpo.replace(/^(\d{3})(\d{3})(\d{3})(\d{0,2}).*/, "$1.$2.$3-$4");
      }

      function formatarCpfParaExibicao(cpf) {
        var cpfLimpo = somenteDigitos(cpf).substring(0, 11);

        if (maskToggle.checked) {
          return aplicarMascaraCpf(cpfLimpo);
        }

        return cpfLimpo;
      }

      function definirMensagem(tipo, texto) {
        if (!texto) {
          statusContainer.innerHTML = "";
          return;
        }

        statusContainer.innerHTML = '<div class="alert alert-' + tipo + '" id="statusMessage" role="alert">' + texto + '</div>';
      }

      function limparEstadoVisual() {
        cpfInput.classList.remove("cpf-valido", "cpf-invalido");
      }

      function atualizarEstadoVisual(valorCpf) {
        var cpfLimpo = somenteDigitos(valorCpf);

        limparEstadoVisual();

        if (!cpfLimpo) {
          definirMensagem("info", "Digite um CPF válido ou clique em Gerar CPF.");
          return;
        }

        if (cpfLimpo.length === 11 && validarCpf(cpfLimpo)) {
          cpfInput.classList.add("cpf-valido");
          definirMensagem("success", "CPF válido.");
          return;
        }

        cpfInput.classList.add("cpf-invalido");
        definirMensagem("danger", "CPF inválido.");
      }

      function cancelarGeracaoPendente() {
        if (pendingGenerationId !== null) {
          globalThis.clearTimeout(pendingGenerationId);
          pendingGenerationId = null;
          generateButton.disabled = false;
        }
      }

      function onInputCpf() {
        var cpfLimpo;

        if (pendingGenerationId !== null) {
          cancelarGeracaoPendente();
          definirMensagem("warning", "Geracao cancelada. Continue digitando ou gere novamente.");
        }

        cpfLimpo = somenteDigitos(cpfInput.value).substring(0, 11);

        if (maskToggle.checked) {
          cpfInput.value = aplicarMascaraCpf(cpfLimpo);
        } else {
          cpfInput.value = cpfLimpo;
        }

        atualizarEstadoVisual(cpfLimpo);
      }

      function onToggleMascara() {
        var cpfLimpo = somenteDigitos(cpfInput.value).substring(0, 11);

        if (pendingGenerationId !== null) {
          return;
        }

        cpfInput.value = formatarCpfParaExibicao(cpfLimpo);
        atualizarEstadoVisual(cpfLimpo);
      }

      function onGerarCpf() {
        var cpfGerado = gerarCpfValido();

        cancelarGeracaoPendente();
        generateButton.disabled = true;
        cpfInput.value = "Processando...";
        limparEstadoVisual();
        definirMensagem("info", "Gerando um CPF válido...");

        pendingGenerationId = globalThis.setTimeout(function() {
          pendingGenerationId = null;
          generateButton.disabled = false;
          cpfInput.value = formatarCpfParaExibicao(cpfGerado);
          atualizarEstadoVisual(cpfGerado);
        }, 3000);
      }

      cpfInput.addEventListener("input", onInputCpf);
      maskToggle.addEventListener("change", onToggleMascara);
      generateButton.addEventListener("click", onGerarCpf);

      definirMensagem("info", "Digite um CPF válido ou clique em Gerar CPF.");
    </script>
  </body>
</html>
