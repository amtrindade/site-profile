<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amtrindade - Treinamento em automacao de testes">
    <meta name="author" content="Antonio Trindade - http://about.me/amtrindade">

    <title>Gerador e Validador de CPF</title>

    <link href="css/bootstrap.css" rel="stylesheet">
    <link href="css/justified-nav.css" rel="stylesheet">
    <link href="css/base.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">
    <link href="css/components.css" rel="stylesheet">
    <link href="css/pages/gerador-cpf.css" rel="stylesheet">
  </head>

  <body>
    <div class="container" id="appContainer">
      <div class="masthead" id="pageHeader">
        <h3 class="text-muted" id="headerTitle">Treinamento em Automacao de Testes</h3>
        <ul class="nav nav-justified" id="mainNavigation">
          <li id="navItemHome"><a id="navHome" href="index.html">Home</a></li>
          <li id="navItemAlerts"><a id="navAlerts" href="alertsconfirmation.html">Alerts and Confirmations</a></li>
          <li id="navItemCalculadora"><a id="navCalculadora" href="desafiosoma.html">Calculadora</a></li>
          <li id="navItemTabela"><a id="navTabela" href="localizandovalorestable.html">Localizar Table</a></li>
          <li id="navItemXpath"><a id="navXpath" href="utilizandoxpath.html">Localizando por Xpath</a></li>
          <li id="navItemWebElementos"><a id="navWebElementos" href="elementsweb.html">Web Elementos</a></li>
          <li class="active" id="navItemGeradorCpf"><a id="navGeradorCpf" href="geradorcpf.html">Gerador CPF</a></li>
        </ul>
      </div>

      <div class="cpf-panel text-center" id="cpfPanel">
        <h1 id="pageTitle">Gerador e Validador de CPF</h1>
        <p class="lead" id="pageDescription">Gere um CPF válido, alterne a mascara e valide o valor digitado em tempo real.</p>

        <div class="form-group text-left" id="cpfFieldGroup">
          <label for="cpfInput" id="cpfInputLabel">CPF</label>
          <input type="text" class="form-control input-lg" id="cpfInput" placeholder="Digite um CPF ou gere um novo" autocomplete="off">
        </div>

        <div class="checkbox text-left" id="maskToggleGroup">
          <label id="maskToggleLabel">
            <input type="checkbox" id="maskToggle" checked>
            Exibir mascara
          </label>
        </div>

        <div class="cpf-actions" id="cpfActions">
          <button type="button" class="btn btn-primary btn-lg" id="generateButton">Gerar CPF</button>
        </div>

        <div class="cpf-status" id="statusContainer"></div>
      </div>

      <div class="footer" id="pageFooter"></div>
    </div>

    <script src="js/pages/gerador-cpf.js" defer></script>
  </body>
</html>
