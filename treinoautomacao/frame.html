<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame Test</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .frame-content {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 0;
      margin: 0;
    }

    #tfiframe {
      width: 290px;
      max-width: 100%;
      box-sizing: border-box;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="frame-content">
    <label class="sr-only" for="tfiframe">Campo de texto do iframe</label>
    <input type="text" id="tfiframe">
    <input type="button" id="btniframe" value="Button" onclick="alert('Click OK!');">
  </div>
</body>
</html>
