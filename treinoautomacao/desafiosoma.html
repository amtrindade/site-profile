<html lang="pt-BR">
	<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AMTrindade - Treinamento em automação de testes">
    <meta name="author" content="Antonio Trindade - http://about.me/amtrindade">
    
    <title>Desafio Automação Cálculos</title>

    <!-- Bootstrap core CSS -->
    <link href="css/bootstrap.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="css/justified-nav.css" rel="stylesheet">
	<link href="css/base.css" rel="stylesheet">
	<link href="css/layout.css" rel="stylesheet">
	<link href="css/components.css" rel="stylesheet">
	<link href="css/pages/desafiosoma.css" rel="stylesheet">
</head>
<body class="calc-page">
	<div class="container">
	  <div data-menu-slot data-active-page="desafiosoma"></div>
		<main class="calc-card panel-soft" role="main">
			<p class="calc-intro">Informe os valores e selecione uma das operações aritméticas:</p>
			<div class="calc-grid">
				<div class="calc-field">
					<label for="number1">Valor 1</label>
					<input id="number1" type="text">
				</div>
				<div class="calc-field">
					<label for="number2">Valor 2</label>
					<input id="number2" type="text">
				</div>
				<div class="calc-field">
					<label for="total">Total</label>
					<input id="total" type="text">
				</div>
			</div>

			<div class="calc-actions actions-row">
				<input id="somar" value="Somar" type="button">
				<input id="subtrair" value="Subtrair" type="button">
				<input id="multiplicar" value="Multiplicar" type="button">
				<input id="dividir" value="Dividir" type="button">
				<input id="limpar" value="Limpar" type="button">
			</div>
		</main>
		<!-- Site footer -->
      <div class="footer">
        <!--<p>Treino Automação de Testes - TargetTrust Treinamento e Tecnologia - Porto Alegre/RS - 2016</p>-->
      </div>
	</div>
	<script src="js/core/menu-loader.js" defer></script>
	<script src="js/pages/desafiosoma.js" defer></script>
</body>
</html>
