		<div class="row">
		<br>
		<ol>
		  <li>Informe os valores e selecione uma das operações aritméticas: <br />
			<div style="position: relative; width: 100px; left: 2px; top: 16px; height: 15px;">Valor 1</div>
			<div style="position: relative; width: 100px; left: 155px;">Valor 2</div>
			<div style="position: relative; width: 100px; left: 330px; top: -16px; height: 15px;">Total</div>

			<input id="number1" type="text">&nbsp;
			<input id="number2" type="text">&nbsp;=&nbsp;
			<input id="total" type="text"> <br />
			
			<script type="text/javascript">
				function clear_campos()
					{document.getElementById("total").value = '';
					 document.getElementById("number1").value = '';
					 document.getElementById("number2").value = '';
					}
				function somar_valores()
				   {document.getElementById("total").value = parseFloat(document.getElementById("number1").value) + parseFloat(document.getElementById("number2").value);}
				function multiplicar_valores()
					{document.getElementById("total").value = parseFloat(document.getElementById("number1").value) * parseFloat(document.getElementById("number2").value);}
				function subtrair_valores()
					{document.getElementById("total").value = parseFloat(document.getElementById("number1").value) - parseFloat(document.getElementById("number2").value);}
				function dividir_valores()
					{document.getElementById("total").value = parseFloat(document.getElementById("number1").value) / parseFloat(document.getElementById("number2").value);}
			</script>
			
			<br>
				
				<input id="somar" value="Somar" onclick="setTimeout(somar_valores, 2000);" type="button">&nbsp;&nbsp;&nbsp;
				<input id="subtrair" value="Subtrair" onclick="subtrair_valores()" type="button">&nbsp;&nbsp;&nbsp;
				<input id="multiplicar" value="Multiplicar" onclick="multiplicar_valores()" type="button">&nbsp;&nbsp;&nbsp;
				<input id="dividir" value="Dividir" onclick="dividir_valores()" type="button">&nbsp;&nbsp;&nbsp;
				<input id="limpar" value="Limpar" onclick="clear_campos()" type="button"> </li>
				
			<br>
		</ol>
